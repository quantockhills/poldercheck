target-version = "py312"
line-length = 120

[lint]
select = [
  "E",   # pycodestyle errors
  "F",   # pyflakes
  "I",   # isort
  "UP",  # pyupgrade
  "N",   # pep8-naming
]
ignore = [
  "E501",   # line too long — handled by formatter
  "N806",   # non-lowercase variable — intentional for DEBUG_LOG, _STEPS etc
]
